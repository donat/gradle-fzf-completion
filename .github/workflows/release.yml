name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.2.3

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package tar.gz
        run: |
          cd dist
          tar -czf fzf_gradle_completion_${{ steps.vars.outputs.VERSION }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: fzf_gradle_completion_${{ steps.vars.outputs.VERSION }}.tar.gz