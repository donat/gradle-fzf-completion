name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on version tags like v1.2.3

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package tar.gz (non-hidden files only)
        run: |
          set -euo pipefail
          archive="fzf_gradle_completion_${{ steps.vars.outputs.VERSION }}.tar.gz"
          out="${RUNNER_TEMP}/${archive}"

          # Create an archive from the repository root, excluding hidden files/dirs (dotfiles) anywhere.
          # Examples excluded: .git, .github, .env, any ".*" under subdirectories.
          # Write the tarball outside the checkout to avoid "file changed as we read it".
          tar \
            --exclude='./.*' \
            --exclude='*/.*' \
            -czf "$out" \
            .

          echo "ARCHIVE_PATH=$out" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}